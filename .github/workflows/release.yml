name: release

# Build every platform installer and attach them to a GitHub Release.
#
# Trigger: push a tag `vX.Y.Z` (must match pyproject `version`), or run manually
# (workflow_dispatch) to build from the current pyproject version.
#
# Public repo → Linux/macOS/Windows runner minutes are free. NO secrets are
# required: the installers ship UNSIGNED (same as today — macOS "right-click →
# Open", Windows SmartScreen "More info → Run"). To sign + notarize later, fill
# in the secrets named in the commented blocks below; nothing else changes.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      only:
        description: 'Build one platform only (linux | macos | windows). Blank = all. Skips the GitHub Release.'
        required: false
        default: ''

permissions:
  contents: write          # create the GitHub Release (+ tag on manual runs)

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          VER="$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER"    >> "$GITHUB_OUTPUT"
          # On a tag push the tag MUST equal the pyproject version.
          if [ "${GITHUB_REF_TYPE:-}" = tag ] && [ "$GITHUB_REF_NAME" != "v$VER" ]; then
            echo "::error::tag $GITHUB_REF_NAME != pyproject version v$VER — bump one of them"; exit 1
          fi
          echo "building v$VER"

  linux:
    needs: prep
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == '' || inputs.only == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: tooling
        run: |
          sudo apt-get update -qq
          # dpkg-deb is preinstalled; `rpm` provides rpmbuild for the noarch .rpm
          # (build-rpm.sh falls back to a rockylinux:9 container if it's absent).
          sudo apt-get install -y -qq rpm
          python -m pip install -q --upgrade pip
      - name: build .tar.gz + .deb + .rpm
        # build.sh also attempts a Linux xar .pkg; that step fails gracefully here
        # (no bomutils) and we ship the real .pkg from the macOS runner instead.
        run: bash packaging/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          if-no-files-found: error
          path: |
            build/*.tar.gz
            build/*.deb
            build/*.rpm

  macos:
    needs: prep
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == '' || inputs.only == 'macos' }}
    runs-on: macos-latest          # Apple Silicon; the .pkg is arch-independent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: build the bundled wheel
        run: |
          python -m pip install -q --upgrade pip
          python -m pip wheel --no-deps -w build/wheels .

      # ---- Sign (+ optionally notarize) the .pkg with a Developer ID Installer
      # certificate. Gated on the APPLE_INSTALLER_IDENTITY repo variable, so it
      # auto-skips (ships unsigned) until configured. One-time setup (see the
      # workflows README):
      #   secret APPLE_INSTALLER_CERT_P12_BASE64  base64 of the .p12 (cert + PRIVATE KEY)
      #   secret APPLE_CERT_PASSWORD              the .p12 export password
      #   var    APPLE_INSTALLER_IDENTITY         "Developer ID Installer: NAME (TEAMID)"
      # Optional notarization (fully clears Gatekeeper for downloaded pkgs):
      #   var    APPLE_NOTARIZE = true
      #   var    APPLE_TEAM_ID  = LGT8FC5ZZZ
      #   secrets APPLE_NOTARY_APPLE_ID (Apple ID email) / APPLE_NOTARY_APP_PASSWORD (app-specific password)
      - name: import Developer ID Installer cert
        if: ${{ vars.APPLE_INSTALLER_IDENTITY != '' }}
        env:
          CERT: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          PW:   ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p ci "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p ci "$KC"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$PW" \
            -T /usr/bin/productsign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k ci "$KC" >/dev/null
          # Put our keychain first in the search list so productbuild finds the identity.
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          security find-identity -v "$KC" | grep "Developer ID Installer" || \
            { echo "::error::Developer ID Installer identity not found in the imported .p12 (is the private key included?)"; exit 1; }
      - name: store notarytool profile
        if: ${{ vars.APPLE_NOTARIZE == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APP_PW:   ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          TEAM_ID:  ${{ vars.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials priorstates-notary \
            --apple-id "$APPLE_ID" --password "$APP_PW" --team-id "$TEAM_ID"

      - name: build .pkg
        env:
          # Empty when the var is unset → build-pkg.sh builds an unsigned .pkg.
          PRIORSTATES_PKG_SIGN_ID:    ${{ vars.APPLE_INSTALLER_IDENTITY }}
          PRIORSTATES_NOTARY_PROFILE: ${{ vars.APPLE_NOTARIZE == 'true' && 'priorstates-notary' || '' }}
          # Cap on notarytool --wait. A brand-new Apple account's FIRST submission
          # can take ~1h; later ones are minutes. Bump via the APPLE_NOTARY_TIMEOUT
          # repo variable (e.g. 90m) if needed; on timeout we ship the signed .pkg.
          PRIORSTATES_NOTARY_TIMEOUT: ${{ vars.APPLE_NOTARY_TIMEOUT || '60m' }}
        run: bash packaging/macos/build-pkg.sh
      - name: verify no-admin install (install-for-me-only)
        run: |
          pkg="$(ls build/*.pkg | head -1)"
          pkgutil --expand "$pkg" "$RUNNER_TEMP/ps-pkg"
          # The home domain (no enable_localSystem) is what makes Installer.app
          # offer "Install for me only" with no admin password.
          if grep -q 'enable_currentUserHome="true"' "$RUNNER_TEMP/ps-pkg/Distribution" \
             && ! grep -q 'enable_localSystem="true"' "$RUNNER_TEMP/ps-pkg/Distribution"; then
            echo "✓ pkg is a home-domain (no-admin) install"
          else
            echo "::error::pkg is NOT configured for a no-admin home install"; exit 1
          fi
          # Best-effort end-to-end: actually install to the home WITHOUT sudo.
          if installer -pkg "$pkg" -target CurrentUserHomeDirectory; then
            test -f "$HOME/Library/PriorStates/install.sh" \
              && echo "✓ no-sudo install landed in ~/Library/PriorStates"
          else
            echo "::warning::no-sudo install run did not finish cleanly (config gate already passed)"
          fi
      - uses: actions/upload-artifact@v4
        with: { name: macos, path: build/*.pkg, if-no-files-found: error }

  windows:
    needs: prep
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only == '' || inputs.only == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: build the bundled wheel
        shell: bash
        run: |
          python -m pip install -q --upgrade pip
          mkdir -p build/windows
          python -m pip wheel --no-deps -w build/windows .
      - name: install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: build Setup.exe
        shell: pwsh
        run: |
          $ver = "${{ needs.prep.outputs.version }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Q "/DMyAppVersion=$ver" packaging\windows\priorstates.iss

      # Upload the (unsigned) installer. This is also the artifact SignPath signs.
      - name: upload installer artifact
        id: win_exe
        uses: actions/upload-artifact@v4
        with: { name: windows, path: build/windows/*.exe, if-no-files-found: error }

      # ---- Code-sign with SignPath (free for OSS) ----
      # SignPath's cloud HSM signs the artifact above and returns it signed — the
      # certificate never touches CI. Skips automatically until enrolled, so the
      # build still works unsigned. One-time setup (see the workflows README):
      #   1. Apply to SignPath Foundation (https://signpath.org), free for OSS.
      #   2. Install the SignPath GitHub App on this repo (build provenance).
      #   3. Create a project + signing policy in SignPath.
      #   4. Repo secret:  SIGNPATH_API_TOKEN
      #      Repo vars:    SIGNPATH_ORGANIZATION_ID  (enables these steps)
      #                    SIGNPATH_PROJECT_SLUG          (default: priorstates)
      #                    SIGNPATH_SIGNING_POLICY_SLUG   (default: release-signing)
      - name: sign installer (SignPath)
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG || 'priorstates' }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG || 'release-signing' }}
          github-artifact-id: ${{ steps.win_exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
      - name: replace artifact with the signed installer
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: signed/*.exe
          overwrite: true
          if-no-files-found: error

  github-release:
    needs: [prep, linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - name: add stable-named copies
        # These power the version-free `releases/latest/download/<name>` URLs that
        # priorstates.com/download/ 302-redirects to. Each release carries both the
        # versioned asset (archival) and a stable copy.
        env:
          VER: ${{ needs.prep.outputs.version }}
        run: |
          cd dist
          cp "priorstates-$VER.pkg"          priorstates-latest.pkg        2>/dev/null || true
          cp "priorstates-$VER.tar.gz"       priorstates-latest.tar.gz     2>/dev/null || true
          cp "priorstates_${VER}_all.deb"    priorstates-latest.deb        2>/dev/null || true
          cp "priorstates-$VER-1.noarch.rpm" priorstates-latest.noarch.rpm 2>/dev/null || true
          cp "PriorStates-$VER-Setup.exe"    PriorStates-Setup.exe         2>/dev/null || true
      - name: checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - name: list
        run: ls -l dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prep.outputs.tag }}
          name: ${{ needs.prep.outputs.tag }}
          generate_release_notes: true
          files: dist/*
      - name: verify branded download links resolve
        # priorstates.com/download/<name> 302→ this release's stable asset.
        # No secrets, no mirror — just confirm the public URLs work post-publish.
        run: |
          fail=0
          for p in priorstates-latest.deb priorstates-latest.noarch.rpm \
                   priorstates-latest.tar.gz priorstates-latest.pkg PriorStates-Setup.exe; do
            code=000
            for i in 1 2 3 4; do
              code="$(curl -s -o /dev/null -w '%{http_code}' -IL "https://priorstates.com/download/$p")"
              [ "$code" = 200 ] && break || sleep 5
            done
            echo "  $p -> $code"; [ "$code" = 200 ] || fail=1
          done
          [ "$fail" = 0 ] || { echo "::error::branded /download link not resolving (asset or redirect issue)"; exit 1; }

  # Publish a winget manifest update on each release — a corporate-friendly Windows
  # channel (often allow-listed even when direct .exe downloads are blocked). Gated
  # on the WINGET_PUBLISH variable so it auto-skips until the package is FIRST
  # submitted to microsoft/winget-pkgs by hand (see packaging/winget/README.md);
  # after that, this opens the per-release update PR automatically.
  winget:
    needs: [prep, github-release]
    if: ${{ vars.WINGET_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal/winget-releaser@v2
        with:
          identifier: PriorStates.PriorStates
          version: ${{ needs.prep.outputs.version }}
          release-tag: ${{ needs.prep.outputs.tag }}
          installers-regex: 'PriorStates-[0-9].*-Setup\.exe$'   # the versioned exe, not the -latest alias
          token: ${{ secrets.WINGET_TOKEN }}
